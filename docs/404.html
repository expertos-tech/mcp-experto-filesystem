<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
  >
  <meta
    name="description"
    content="Technical documentation for the MCP Experto Filesystem project."
  >
  <title>MCP Experto Filesystem Docs</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
  >
</head>
<body>
  <div id="app">Loading documentation...</div>

  <script>
    window.$docsify = {
      name: "mcp-experto-filesystem",
      repo: "https://github.com/expertos-tech/mcp-experto-filesystem",
      homepage: "README.md",
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      relativePath: true,
      subMaxLevel: 2,
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
        "/.*/_navbar.md": "/_navbar.md"
      },
      search: {
        paths: "auto",
        placeholder: "Search documentation",
        noData: "No results found"
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
