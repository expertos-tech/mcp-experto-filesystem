<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
  >
  <meta
    name="description"
    content="Technical documentation for the MCP Experto Filesystem project."
  >
  <title>MCP Experto Filesystem Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.css"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css"
  >
  <link rel="stylesheet" href="./_media/custom.css">
  <style>
    html[data-theme="dark"] .sidebar-toggle,
    html[data-theme="dark"] .sidebar-toggle-button {
      color: #e2e8f0 !important;
    }

    html[data-theme="dark"] .sidebar-toggle span,
    html[data-theme="dark"] .sidebar-toggle-button span {
      background: #e2e8f0 !important;
      background-color: #e2e8f0 !important;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <button
    id="theme-toggle"
    class="theme-toggle"
    type="button"
    aria-label="Toggle dark mode"
  >
    <span class="theme-toggle__sun">Light</span>
    <span class="theme-toggle__moon">Dark</span>
  </button>

  <script>
    (function () {
      const storedTheme = localStorage.getItem("docs-theme");
      const preferredDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = storedTheme || (preferredDark ? "dark" : "light");

      document.documentElement.setAttribute("data-theme", theme);
    })();

    function ensureSidebarBrand() {
      const sidebar = document.querySelector(".sidebar");
      const search = sidebar && sidebar.querySelector(".search");

      if (!sidebar || !search) {
        return false;
      }

      if (!sidebar.querySelector(".sidebar-brand-art")) {
        const brand = document.createElement("div");
        brand.className = "sidebar-brand-art";
        brand.innerHTML =
          '<img src="_media/images/logo-480.png" alt="MCP Experto Filesystem logo">';
        sidebar.insertBefore(brand, search);
      }

      return true;
    }

    function mountSidebarBrand(retries) {
      if (ensureSidebarBrand() || retries <= 0) {
        return;
      }

      window.setTimeout(function () {
        mountSidebarBrand(retries - 1);
      }, 120);
    }

    window.$docsify = {
      name: "",
      repo: "https://github.com/expertos-tech/mcp-experto-filesystem",
      homepage: "README.md",
      loadSidebar: true,
      loadNavbar: false,
      auto2top: true,
      relativePath: true,
      maxLevel: 3,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1,
      themeColor: "#0f766e",
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
        "/.*/_navbar.md": "/_navbar.md"
      },
      themeable: {
        readyTransition: true,
        responsiveTables: true
      },
      search: {
        paths: "auto",
        depth: 4,
        hideOtherSidebarContent: true,
        namespace: "mcp-experto-filesystem-docs",
        placeholder: "Search the docs",
        noData: "No results found"
      },
      pagination: {
        previousText: "Previous",
        nextText: "Next",
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: "Copy",
        errorText: "Error",
        successText: "Copied"
      },
      mermaidConfig: {
        querySelector: ".mermaid"
      },
      plugins: [
        function (hook) {
          hook.mounted(function () {
            mountSidebarBrand(20);
          });

          hook.doneEach(function () {
            mountSidebarBrand(20);
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docsify-copy-code/3.0.2/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

    mermaid.initialize({ startOnLoad: true, theme: "neutral" });
    window.mermaid = mermaid;
  </script>
  <script src="https://unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  <script src="./_media/theme-toggle.js"></script>
</body>
</html>
