services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    user: "0:0"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./data/collector:/var/lib/otelcol
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v3.11.2
    user: "0:0"
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-remote-write-receiver
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./data/prometheus:/prometheus

  loki:
    image: grafana/loki:3.7.1
    user: "0:0"
    command: ["-config.file=/etc/loki/loki.yaml"]
    restart: unless-stopped
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ./data/loki:/loki

  tempo:
    image: grafana/tempo:2.10.4
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    restart: unless-stopped
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ./data/tempo:/var/tempo

  grafana:
    image: grafana/grafana-oss:13.0.1
    user: "0:0"
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
